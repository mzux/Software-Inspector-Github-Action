name: 월간 소프트웨어 검사 자동화

on:
  schedule:
    - cron: '0 0 28 * *'   # 매월 28일 09:00 KST (UTC 00:00) 최초 실행
  workflow_dispatch:
    inputs:
      retry_count:
        description: '재시도 횟수 (자동 관리, 수동 실행 시 0으로 두세요)'
        required: false
        default: '0'
      month:
        description: '대상 연월 (YYYYMM, 비워두면 자동 판별)'
        required: false
        default: ''

concurrency:
  group: sw-inspector-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-inspector:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # GitHub Releases 생성 및 파일 업로드에 필요
      actions: write    # workflow_dispatch 재트리거에 필요

    steps:
      # ── 1. 코드 체크아웃 ──────────────────────────────────
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # ── 2. Python 설치 ────────────────────────────────────
      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. 패키지 설치 ────────────────────────────────────
      - name: 패키지 설치
        run: |
          pip install --upgrade pip
          pip install \
            gspread \
            google-api-python-client \
            google-auth \
            requests

      # ── 4. credentials.json 생성 (Secret → 파일) ─────────
      - name: credentials.json 생성
        run: |
          echo $GOOGLE_CREDENTIALS_JSON > credentials.json
          echo "✅ credentials.json 생성 완료"
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      # ── 5. 재시도 횟수 계산 ───────────────────────────────
      - name: 재시도 횟수 계산
        id: retry
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            RETRY=0
          else
            RETRY="${{ github.event.inputs.retry_count }}"
            RETRY="${RETRY:-0}"
          fi
          echo "count=${RETRY}" >> $GITHUB_OUTPUT
          echo "▶ 현재 재시도 횟수: ${RETRY}"

      # ── 6. 스크립트 실행 ──────────────────────────────────
      - name: 소프트웨어 검사 자동화 실행
        id: inspector
        env:
          # 구글 관련 Secret
          SHEET_URL:               ${{ secrets.SHEET_URL }}
          GDRIVE_SOURCE_FOLDER_ID: ${{ secrets.GDRIVE_SOURCE_FOLDER_ID }}
          JANDI_WEBHOOK_URL:       ${{ secrets.JANDI_WEBHOOK_URL }}
          # GitHub Releases 업로드용 — 별도 Secret 불필요, 자동 제공
          GITHUB_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:       ${{ github.repository }}
        run: |
          MONTH_ARG="${{ github.event.inputs.month }}"
          if [ -n "$MONTH_ARG" ]; then
            MONTH_OPT="--month $MONTH_ARG"
          else
            MONTH_OPT=""
          fi

          set +e
          python sw_inspector_auto.py all --notify $MONTH_OPT
          EXIT_CODE=$?
          set -e

          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT
          echo "▶ 스크립트 종료 코드: ${EXIT_CODE}"

          # exit 2(미제출자 존재)가 아닌 오류는 워크플로우 실패로 처리
          if [ "$EXIT_CODE" -ne 0 ] && [ "$EXIT_CODE" -ne 2 ]; then
            exit $EXIT_CODE
          fi

      # ── 7. 미제출자 있을 때 다음날 재시도 예약 ────────────
      - name: 다음날 재시도 예약 (미제출자 존재 시)
        if: steps.inspector.outputs.exit_code == '2'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RETRY=${{ steps.retry.outputs.count }}
          MAX_RETRY=3  # 28 → 29 → 30 → 31일 (최대 4회 실행)

          echo "현재 재시도: ${RETRY}/${MAX_RETRY}"

          if [ "$RETRY" -lt "$MAX_RETRY" ]; then
            NEXT=$((RETRY + 1))
            echo "⏰ 내일 재시도 예약 (${NEXT}/${MAX_RETRY})..."

            gh workflow run sw_inspector_monthly.yml \
              --ref "${{ github.ref_name }}" \
              --field retry_count="${NEXT}" \
              --field month="${{ github.event.inputs.month }}"

            echo "✅ 내일 실행 예약 완료"
          else
            echo "🚨 최대 재시도 횟수(${MAX_RETRY}) 초과. 수동으로 확인해주세요."
            exit 1
          fi

      # ── 8. 실행 결과 요약 ─────────────────────────────────
      - name: 실행 결과 요약
        if: always()
        run: |
          EXIT="${{ steps.inspector.outputs.exit_code }}"
          RETRY="${{ steps.retry.outputs.count }}"

          if   [ "$EXIT" = "0" ]; then
            echo "🎉 성공: 모든 파일 처리 완료 (재시도: ${RETRY}회)"
          elif [ "$EXIT" = "2" ]; then
            echo "🔁 미제출자 존재: 재시도 예약됨 (${RETRY}회째)"
          else
            echo "❌ 오류 발생 (exit code: ${EXIT})"
          fi

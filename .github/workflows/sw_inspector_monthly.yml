name: 월간 소프트웨어 검사 자동화

# ──────────────────────────────────────────────────────────────
# 실행 트리거
#   25일: 사전 독촉 메시지만 발송 (check)
#   27일: 전체 실행 — 미제출자 있으면 독촉, 없으면 ZIP + Release 업로드
#   28일: 27일 미완료 시 재시도 (Release 이미 있으면 자동 skip)
# ──────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 0 25 * *'   # 매월 25일 09:00 KST — 사전 독촉
    - cron: '0 0 27 * *'   # 매월 27일 09:00 KST — 전체 실행
    - cron: '0 0 28 * *'   # 매월 28일 09:00 KST — 재시도
  workflow_dispatch:
    inputs:
      month:
        description: '대상 연월 (YYYYMM, 비워두면 자동 판별)'
        required: false
        default: ''

concurrency:
  group: sw-inspector-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-inspector:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # GitHub Releases 생성 및 파일 업로드
      actions: write    # workflow_dispatch 트리거

    steps:
      # ── 1. 코드 체크아웃 ──────────────────────────────────
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # ── 2. Python 설치 ────────────────────────────────────
      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. 패키지 설치 ────────────────────────────────────
      - name: 패키지 설치
        run: |
          pip install --upgrade pip
          pip install \
            gspread \
            google-api-python-client \
            google-auth \
            requests

      # ── 4. credentials.json 생성 ──────────────────────────
      - name: credentials.json 생성
        run: |
          echo $GOOGLE_CREDENTIALS_JSON > credentials.json
          echo "✅ credentials.json 생성 완료"
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      # ── 5. 스크립트 실행 ──────────────────────────────────
      - name: 소프트웨어 검사 자동화 실행
        id: inspector
        env:
          SHEET_URL:               ${{ secrets.SHEET_URL }}
          GDRIVE_SOURCE_FOLDER_ID: ${{ secrets.GDRIVE_SOURCE_FOLDER_ID }}
          JANDI_WEBHOOK_URL:       ${{ secrets.JANDI_WEBHOOK_URL }}
          FORM_URL:                ${{ secrets.FORM_URL }}
          GITHUB_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:       ${{ github.repository }}
        run: |
          MONTH_ARG="${{ github.event.inputs.month }}"
          if [ -n "$MONTH_ARG" ]; then
            MONTH_OPT="--month $MONTH_ARG"
          else
            MONTH_OPT=""
          fi

          DAY=$(date +%-d)
          echo "▶ 실행일: ${DAY}일"

          set +e
          if [ "$DAY" = "25" ]; then
            # 25일: 미제출자 확인 + 독촉 메시지만 발송
            echo "📅 25일 사전 독촉 실행"
            python sw_inspector_auto.py check --notify $MONTH_OPT
          else
            # 27일, 28일, 수동 실행: 전체 워크플로우
            echo "📅 전체 실행 (ZIP + Release 업로드)"
            python sw_inspector_auto.py all --notify $MONTH_OPT
          fi
          EXIT_CODE=$?
          set -e

          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT
          echo "▶ 스크립트 종료 코드: ${EXIT_CODE}"

          # exit 2(미제출자 존재)가 아닌 오류는 워크플로우 실패로 처리
          if [ "$EXIT_CODE" -ne 0 ] && [ "$EXIT_CODE" -ne 2 ]; then
            exit $EXIT_CODE
          fi

      # ── 6. 실행 결과 요약 ─────────────────────────────────
      - name: 실행 결과 요약
        if: always()
        run: |
          EXIT="${{ steps.inspector.outputs.exit_code }}"
          DAY=$(date +%-d)

          if [ "$EXIT" = "0" ]; then
            echo "🎉 성공: 모든 파일 처리 완료"
          elif [ "$EXIT" = "2" ]; then
            if [ "$DAY" = "28" ]; then
              echo "🚨 28일까지 미제출자 존재. 수동 확인이 필요합니다."
            else
              echo "🔁 미제출자 존재: 다음 cron 실행 시 재시도됩니다."
            fi
          else
            echo "❌ 오류 발생 (exit code: ${EXIT})"
          fi

name: 월간 소프트웨어 검사 자동화

# ──────────────────────────────────────────────────────────────
# 실행 트리거
# 1. 매월 28~31일 오전 9시 (KST = UTC 00:00) 자동 실행
# 2. workflow_dispatch: 수동 실행 또는 특정 월 재실행용
# ──────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 0 28 * *'   # 매월 28일 09:00 KST
    - cron: '0 0 29 * *'   # 매월 29일 09:00 KST
    - cron: '0 0 30 * *'   # 매월 30일 09:00 KST
    - cron: '0 0 31 * *'   # 매월 31일 09:00 KST (없는 달은 자동 skip)

  workflow_dispatch:
    inputs:
      month:
        description: '대상 연월 (YYYYMM, 비워두면 자동 판별)'
        required: false
        default: ''

# ──────────────────────────────────────────────────────────────
# 동시 실행 방지
# 같은 ref에서 중복 실행이 큐에 쌓이지 않도록 직렬화
# ──────────────────────────────────────────────────────────────
concurrency:
  group: sw-inspector-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-inspector:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. 코드 체크아웃 ──────────────────────────────────
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # ── 2. Python 설치 ────────────────────────────────────
      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. 패키지 설치 ────────────────────────────────────
      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. credentials.json 생성 (Secret → 파일) ─────────
      - name: credentials.json 생성
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > credentials.json
          echo "✅ credentials.json 생성 완료"

      # ── 5. 스크립트 실행 ──────────────────────────────────
      - name: 소프트웨어 검사 자동화 실행
        id: inspector
        env:
          JANDI_WEBHOOK_URL:       ${{ secrets.JANDI_WEBHOOK_URL }}
          GDRIVE_SOURCE_FOLDER_ID: ${{ secrets.GDRIVE_SOURCE_FOLDER_ID }}
          GDRIVE_UPLOAD_FOLDER_ID: ${{ secrets.GDRIVE_UPLOAD_FOLDER_ID }}
        run: |
          MONTH_ARG="${{ github.event.inputs.month }}"
          if [ -n "$MONTH_ARG" ]; then
            MONTH_OPT="--month $MONTH_ARG"
          else
            MONTH_OPT=""
          fi

          set +e
          python sw_inspector_auto.py all --notify $MONTH_OPT
          EXIT_CODE=$?
          set -e

          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT
          echo "▶ 스크립트 종료 코드: ${EXIT_CODE}"

          # 0: 성공
          # 2: 미제출자 존재 (실패 아님, 다음날 cron에 맡김)
          # 그 외: 실제 오류
          if [ "$EXIT_CODE" -ne 0 ] && [ "$EXIT_CODE" -ne 2 ]; then
            exit "$EXIT_CODE"
          fi

      # ── 6. 실행 결과 요약 ─────────────────────────────────
      - name: 실행 결과 요약
        if: always()
        run: |
          EXIT="${{ steps.inspector.outputs.exit_code }}"

          if [ "$EXIT" = "0" ]; then
            echo "🎉 성공: 모든 파일 처리 완료"
          elif [ "$EXIT" = "2" ]; then
            echo "🔁 미제출자 존재: 오늘은 여기서 종료하고 다음날 정기 실행(cron)에서 다시 시도됩니다."
          else
            echo "❌ 오류 발생 (exit code: ${EXIT})"
          fi
